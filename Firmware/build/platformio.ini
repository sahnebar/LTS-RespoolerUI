[platformio]
default_envs = control_board, driver_board, esp32s3_generic, esp32c3_generic

[env]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps =
    h2zero/NimBLE-Arduino
    teemuatlut/TMCStepper @ 0.7.3
    bblanchon/ArduinoJson @ 6.21.3
    adafruit/Adafruit NeoPixel @ 1.12.2

[env:control_board]
build_flags = -D BOARD_VARIANT_CB

[env:driver_board]
build_flags = -D BOARD_VARIANT_DB

[env:esp32s3_generic]
board = esp32-s3-devkitc-1
build_flags = -D BOARD_VARIANT_S3

[env:esp32c3_generic]
board = esp32-c3-devkitm-1
build_flags = -D BOARD_VARIANT_C3

